services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_SERVER: "${DB_SERVER:-}"
      DB_PORT: "${DB_PORT:-1433}"
      DB_NAME: "${DB_NAME:-}"
      DB_USER: "${DB_USER:-}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      API_KEY: "${API_KEY:-}"
      TICKETMASTER_API_KEY: "${TICKETMASTER_API_KEY:-}"
